<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b16" />
    <meta
      name="description"
      content="Промышленный альпинизм в Москве — герметизация швов, мойка фасадов, покраска, монтаж кондиционеров на высоте. Без лесов и автовышек. Договор, страховка до 5 млн ₽, фотоотчёт. Выезд бесплатно."
    />
    <link rel="canonical" href="https://www.vysota-vr.ru/" />
    <!-- Шрифты self-hosted через @fontsource-variable (см. src/main.tsx):
         нет запросов к Google Fonts — быстрее и стабильнее из РФ -->
    <!-- Preload фонового фото Hero — LCP-кандидат на всех вьюпортах -->
    <link
      rel="preload"
      as="image"
      href="/photos/hero-bg.jpg"
      imagesrcset="/photos/hero-bg-480.jpg 480w, /photos/hero-bg-960.jpg 960w, /photos/hero-bg.jpg 1672w"
      imagesizes="(orientation: portrait) 178vh, 100vw"
      fetchpriority="high"
    />
    <!-- Preload LCP-фото hero-коллажа (коллаж рендерится только на десктопе) -->
    <link
      rel="preload"
      as="image"
      href="/photos/vysotnye-raboty.jpg"
      imagesrcset="/photos/vysotnye-raboty-480.jpg 480w, /photos/vysotnye-raboty.jpg 896w"
      imagesizes="340px"
      media="(min-width: 1024px)"
    />
    <title>Вертикальные Решения — промышленный альпинизм в Москве</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Вертикальные Решения — промышленный альпинизм в Москве" />
    <meta property="og:description" content="Герметизация швов, мойка фасадов, покраска и монтаж на высоте без лесов. Договор, страховка, фотоотчёт." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.vysota-vr.ru/" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:image" content="https://www.vysota-vr.ru/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card (использует og:image) -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Геолокация для Яндекса -->
    <meta name="geo.region" content="RU-MOW" />
    <meta name="geo.placename" content="Москва" />

    <!-- JSON-LD — структурированные данные для поисковиков.
         Бренд и телефон продублированы в src/data/site.ts — менять синхронно. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Вертикальные Решения",
      "description": "Промышленный альпинизм в Москве: герметизация швов, мойка фасадов, покраска, монтаж кондиционеров на высоте без лесов и автовышек.",
      "url": "https://www.vysota-vr.ru/",
      "image": "https://www.vysota-vr.ru/og-image.jpg",
      "telephone": "+79165054054",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Москва",
        "addressCountry": "RU"
      },
      "areaServed": [
        { "@type": "City", "name": "Москва" },
        { "@type": "AdministrativeArea", "name": "Московская область" }
      ],
      "openingHours": "Mo-Fr 09:00-20:00",
      "founder": {
        "@type": "Person",
        "name": "Налдеев Олег Денисович"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
