name: Deploy to Timeweb

# Собирает сайт и заливает dist/ на хостинг Timeweb по FTP при каждом push в main.
# Секреты (FTP_SERVER / FTP_USERNAME / FTP_PASSWORD) задаются в настройках репо:
# Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # позволяет запускать деплой вручную из вкладки Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Локальная папка сборки → корень сайта на хостинге.
          # Если FTP-пользователь НЕ заперт в public_html — путь будет
          # vysota/public_html/ ; если заперт прямо в него — просто ./
          local-dir: ./dist/
          server-dir: vysota/public_html/
          # FTP-пользователь Timeweb работает по обычному FTP (TLS у него не включён —
          # проверено: FTPS отдаёт "Requested SSL level failed"). Пароль идёт открыто;
          # для статики это ок. Захотим шифровать — переезд на SFTP (другой action).
          protocol: ftp
